<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CiteIQ Demo</title>
    <style>
      body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #f5f7f8; color: #172026; }
      main { max-width: 980px; margin: 0 auto; padding: 32px 18px; }
      header, section { background: white; border: 1px solid #d9e2df; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
      h1 { margin: 0 0 8px; font-size: 30px; }
      p { color: #5e6d67; }
      .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
      .metric { background: #eef5f2; border-radius: 8px; padding: 14px; }
      .metric strong { display: block; font-size: 24px; margin-top: 6px; }
      input { width: 100%; border: 1px solid #cad7d3; border-radius: 8px; padding: 12px; font: inherit; }
      button { border: 0; border-radius: 8px; background: #18715d; color: white; padding: 12px 14px; font: inherit; cursor: pointer; }
      form { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
      #answer { line-height: 1.6; }
      .citation { background: #f8fbfa; border: 1px solid #dce5e1; border-radius: 8px; padding: 12px; margin-top: 10px; }
      @media (max-width: 760px) { .grid, form { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>CiteIQ</h1>
        <p>Static preview. The full React/FastAPI project is in the repo; this page demonstrates the intended user flow without installing dependencies.</p>
      </header>
      <section class="grid">
        <div class="metric">Documents indexed<strong>4</strong></div>
        <div class="metric">Questions answered<strong>128</strong></div>
        <div class="metric">Citation coverage<strong>96%</strong></div>
        <div class="metric">Backend<strong>pgvector</strong></div>
      </section>
      <section>
        <h2>Ask seeded documents</h2>
        <form id="form">
          <input id="question" value="How many casual leave days do employees receive?" />
          <button>Ask</button>
        </form>
        <div id="answer"></div>
      </section>
    </main>
    <script>
      const docs = [
        ["Leave Policy 2026", "Employees receive 12 casual leave days per calendar year. Sick leave is tracked separately and may require medical evidence for extended absences."],
        ["Expense Reimbursement SOP", "Domestic travel claims must include receipts, trip purpose, project code, and manager approval. Hotel reimbursement is capped at the corporate rate schedule."],
        ["Vendor Contract Template", "Only authorised procurement managers and legal approvers may approve vendor contracts. Interns cannot approve vendor contracts."],
        ["Engineering Incident Runbook", "Production incidents must preserve audit evidence for SOC 2 controls CC7.2 and CC7.3."]
      ];
      document.getElementById("form").addEventListener("submit", (event) => {
        event.preventDefault();
        const q = document.getElementById("question").value.toLowerCase();
        const terms = q.match(/[a-z]+/g) || [];
        const ranked = docs.map(([title, text]) => [title, text, terms.filter((t) => text.toLowerCase().includes(t)).length]).sort((a, b) => b[2] - a[2]);
        const best = ranked[0];
        const answer = best[2] ? best[1] : "I could not find this information in the authorised documents.";
        document.getElementById("answer").innerHTML = `<p>${answer}</p>${best[2] ? `<div class="citation"><strong>Source:</strong> ${best[0]}, p.1</div>` : ""}`;
      });
    </script>
  </body>
</html>
